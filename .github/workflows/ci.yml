name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_never_used_in_production
          CLIENT_URL: http://localhost:5173
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          GEMINI_API_KEY: test
          MONGODB_URI: mongodb://localhost/unused

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
      # A production build catches things unit tests never will — import
      # typos, missing env vars at build time, JSX syntax errors that
      # only surface under Vite's production transform. This is the same
      # command Vercel itself runs on deploy, so a failure here means
      # Vercel would have failed too — caught before merge instead of after.
      - run: npm run build
        env:
          VITE_API_URL: https://smartnepal.onrender.com
